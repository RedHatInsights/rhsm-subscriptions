/text><text fill="#000000" font-family="sans-serif" font-size="10" font-weight="bold" lengthAdjust="spacing" textLength="141.2174" x="2078.6" y="1120.5339">billingAccountId is separate:</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="259.0798" x="2078.6" y="1134.1538">customerAwsAccountId = subscription.billingAccountId</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="125.2699" x="2078.6" y="1147.7738">(the AWS account number)</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="2.6" x="2078.6" y="1161.3938">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="10" font-weight="bold" lengthAdjust="spacing" textLength="152.9174" x="2078.6" y="1175.0138">These are two different values:</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="22.14" x="2081.2" y="1190.6338">Field</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="29.43" x="2176.8499" y="1190.6338">Origin</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="26.01" x="2331.9598" y="1190.6338">Value</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="2.6" x="2078.6" y="1204.2538">&#160;</text><text fill="#1565C0" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="76.35" x="2081.2" y="1204.2538">billingAccountId</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="2.6" x="2157.55" y="1204.2538">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="149.9099" x="2176.8499" y="1204.2538">externalRef.customerAccountID</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="113.84