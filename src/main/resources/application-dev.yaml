# For example: SPRING_PROFILES_ACTIVE=worker,api,kafka-queue,dev
SERVER_PORT: 8010
METRICS_SERVER_PORT: 9010
ENABLE_SYNCHRONOUS_OPERATIONS: true
DEV_MODE: true
# Fetch interval is defined in seconds
UNLEASH_FETCH_TOGGLES_INTERVAL: 1S