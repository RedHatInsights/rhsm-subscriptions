name: CI Pipeline

on:
  push:
    branches: [main, hotfix]
  pull_request:
    branches: [main, hotfix]
    types: [opened, synchronize, reopened]

jobs:
  lint:
    name: Check
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
        name: checkout code
      - uses: actions/setup-java@v4
        name: setup JDK
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: run gradle check task
        run: |
          ./gradlew --no-daemon --no-parallel check -Dquarkus.gradle-worker.no-process=true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4
        name: checkout code
      - uses: actions/setup-java@v4
        name: setup JDK
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: run gradle assemble task
        run: |
          ./gradlew --no-daemon --no-parallel assemble -Dquarkus.gradle-worker.no-process=true

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            **/build/libs/*.jar
            **/build/distributions/*

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4
        name: checkout code
      - uses: actions/setup-java@v4
        name: setup JDK
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: run gradle test and code coverage task
        run: |
          ./gradlew --no-daemon --no-parallel test testCodeCoverageReport \
            -Dquarkus.gradle-worker.no-process=true

      - name: upload code coverage
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage
          path: |
            **/build/reports/jacoco/test/html/
            **/build/reports/jacoco/test/jacocoTestReport.xml

      - name: Publish Test Results as PR Comment
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: '**/build/test-results/test/TEST-*.xml'
