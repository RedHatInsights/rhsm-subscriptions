name: PR Validation – Pre-Container

on:
  push:
    branches: [main, hotfix]
  pull_request:
    branches: [main, hotfix]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-format:
    name: Validate Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Cache Gradle & build outputs
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            buildSrc/.gradle
            buildSrc/build
            **/.gradle
            **/build
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'buildSrc/**/*.kt', 'buildSrc/**/*.java') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run Spotless & Checkstyle
        run: ./gradlew --no-daemon --no-parallel spotlessCheck checkstyleMain checkstyleTest

  validate-floorplan-queries:
    name: Validate FloorPlan Queries
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Git config
        run: |
          git config --global user.name "$(git log -1 --pretty=format:'%an')"
          git config --global user.email "$(git log -1 --pretty=format:'%ae')"

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup JBang
        uses: jbangdev/setup-jbang@main

      - name: Setup yamlpath
        run: |
          jbang trust add https://github.com/yaml-path/jbang/
          curl -Ls https://sh.jbang.dev | bash -s - app install --fresh --force yamlpath@yaml-path/jbang

      - name: Setup PostgreSQL DB
        run: docker run -d -v ./init_dbs.sh:/usr/share/container-scripts/postgresql/start/set_passwords.sh:z -p 5432:5432 -e POSTGRESQL_ADMIN_PASSWORD=admin quay.io/centos7/postgresql-13-centos7:centos7

      - name: Setup PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Execute migrations
        run: ./gradlew --no-daemon --no-parallel :liquibaseUpdate

      - name: Run FloorPlan Query Validation
        run: |
          QUERY_NAMES=$(yamlpath --format=PLAIN --single --expression="objects.(kind==FloorPlan).spec.queries.prefix" swatch-tally/deploy/clowdapp.yaml | tail -c +2 | head -c -2)
          for rawQueryName in ${QUERY_NAMES[*]}; do
            queryName=$(echo $rawQueryName | sed 's/,//g')
            query=$(yamlpath --format=PLAIN --single --expression="objects.(kind==FloorPlan).spec.queries.(prefix == $queryName).query" swatch-tally/deploy/clowdapp.yaml | sed 's/;//g')
            echo -e "Validating query: \n$query\n"
            output=$(PGPASSWORD=rhsm-subscriptions psql -h localhost -U rhsm-subscriptions -d rhsm-subscriptions -c "$query;")
            if [[ "$output" != *"(0 rows)"* ]]; then
              echo -e "Error in query. Check the output for more information: \n$output"
              exit 1
            fi
          done
          echo "Queries validation was successful"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [validate-format, validate-floorplan-queries]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Restore Gradle Cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            buildSrc/.gradle
            buildSrc/build
            **/.gradle
            **/build
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'buildSrc/**/*.kt', 'buildSrc/**/*.java') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run Gradle Build
        run: ./gradlew --no-daemon --no-parallel clean build -x test

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            **/build/libs/*.jar
            **/build/distributions/*

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Restore Gradle Cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            buildSrc/.gradle
            buildSrc/build
            **/.gradle
            **/build
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'buildSrc/**/*.kt', 'buildSrc/**/*.java') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run Tests
        run: ./gradlew --no-daemon --no-parallel test testCodeCoverageReport

      - name: Upload Code Coverage
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage
          path: |
            **/build/reports/jacoco/test/html/
            **/build/reports/jacoco/test/jacocoTestReport.xml

      - name: Publish Test Results to PR
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: '**/build/test-results/test/*.xml'

  summary:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [build, test]
    if: always()

    steps:
      - name: Download Coverage
        uses: actions/download-artifact@v4
        with:
          name: code-coverage
          path: coverage-report

      - name: Print Job Status
        run: |
          echo "Build: ${{ needs.build.result }}"
          echo "Test: ${{ needs.test.result }}"

      - name: Extract Coverage %
        id: coverage
        run: |
          MISSED=$(grep -oPm1 '(?<=<counter type="INSTRUCTION" missed=")[^"]+' coverage-report/jacocoTestReport.xml)
          COVERED=$(grep -oPm1 '(?<=covered=")[^"]+' coverage-report/jacocoTestReport.xml)
          TOTAL=$((MISSED + COVERED))
          PERCENT=$((100 * COVERED / TOTAL))
          echo "coverage=$PERCENT" >> $GITHUB_OUTPUT

      - name: Post PR Summary Comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: "ci-summary"
          message: |
            ✅ **CI Summary**

            - **Build**: `${{ needs.build.result }}`
            - **Test**: `${{ needs.test.result }}`
            - **Coverage**: `${{ steps.coverage.outputs.coverage }}%`

            📦 [Download build artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Fail CI if Test Failed
        if: needs.test.result == 'failure'
        run: |
          echo "❌ Lint or Test failed – failing build."
          exit 1
