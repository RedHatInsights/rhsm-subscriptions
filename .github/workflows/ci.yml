name: CI Pipeline

on:
  push:
    branches: [main, hotfix]
  pull_request:
    branches: [main, hotfix]
    types: [opened, synchronize, reopened]

jobs:
  lint:
    name: Check
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle & build outputs
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            **/.gradle
            **/build
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle

      - name: Run Gradle Check Task
        run: |
          ./gradlew --no-daemon --no-parallel spotlessCheck checkstyle -Dquarkus.gradle-worker.no-process=true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Restore Gradle & build cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            **/.gradle
            **/build
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle

      - name: Run Gradle Assemble Task
        run: |
          ./gradlew --no-daemon --no-parallel assemble -Dquarkus.gradle-worker.no-process=true

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            **/build/libs/*.jar
            **/build/distributions/*

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Restore Gradle & build cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            **/.gradle
            **/build
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle

      - name: Run Gradle Test & Code Coverage
        run: |
          ./gradlew --no-daemon --no-parallel test testCodeCoverageReport \
            -Dquarkus.gradle-worker.no-process=true

      - name: Upload Code Coverage
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage
          path: |
            **/build/reports/jacoco/test/html/
            **/build/reports/jacoco/test/jacocoTestReport.xml

      - name: Publish Test Results as PR Comment
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: '**/build/test-results/test/TEST-*.xml'
  summary:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [lint, build, test]
    if: always()

    steps:
      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: code-coverage
          path: coverage-report

      - name: Print Job Status
        run: |
          echo "Lint: ${{ needs.lint.result }}"
          echo "Build: ${{ needs.build.result }}"
          echo "Test: ${{ needs.test.result }}"

      - name: Extract Coverage %
        id: coverage
        run: |
          COVERAGE=$(grep -oPm1 '(?<=<counter type="INSTRUCTION" missed=")[^"]+' coverage-report/jacocoTestReport.xml)
          MISSED=$COVERAGE
          COVERED=$(grep -oPm1 '(?<=covered=")[^"]+' coverage-report/jacocoTestReport.xml)
          TOTAL=$((MISSED + COVERED))
          PERCENT=$((100 * COVERED / TOTAL))
          echo "Coverage is $PERCENT%"
          echo "coverage=$PERCENT" >> $GITHUB_OUTPUT

      - name: Post PR Summary Comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: "ci-summary"
          message: |
            ✅ **CI Summary**

            - **Lint**: `${{ needs.lint.result }}`
            - **Build**: `${{ needs.build.result }}`
            - **Test**: `${{ needs.test.result }}`
            - **Coverage**: `${{ steps.coverage.outputs.coverage }}%`

            📦 [Download build artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Fail CI if Lint or Test Failed
        if: |
          needs.lint.result == 'failure' || needs.test.result == 'failure'
        run: |
          echo "Lint or Test failed – failing build."
          exit 1
