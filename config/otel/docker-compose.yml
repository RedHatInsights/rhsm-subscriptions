---
services:
  otel-collector:
    image: jaegertracing/all-in-one:1.60
    command: ["--config-file=/etc/otel-collector-config.yaml"]
    volumes:
      - ./collector-config.yaml:/etc/otel-collector-config.yaml:z
    environment:
      - COLLECTOR_ZIPKIN_HOST_PORT=9411
    ports:
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "5778:5778"
      - "16686:16686" # UI
      - "4317:4317" # OTLP gRPC receiver
      - "4318:4318"
      - "14250:14250"
      - "14268:14268"
      - "14269:14269"
      - "9411:9411"
