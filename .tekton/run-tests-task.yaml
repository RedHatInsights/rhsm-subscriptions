apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: run-tests
spec:
  params:
    - name: SERVICE
      description: The service to be tested
    - name: PROVISION_EAAS_SPACE_SECRET_REF
      description: The secret ref of the "provision-eaas-space" task output
  workspaces:
    - name: source
  steps:
    - image: registry.access.redhat.com/ubi9/openjdk-17-runtime
      name: builder
      workingDir: $(workspaces.source.path)/source
      env:
        - name: SERVICE
          value: $(params.SERVICE)
      # from Jenkins file ./gradlew --no-daemon --no-parallel build testCodeCoverageReport -Dquarkus.gradle-worker.no-process=true
      script: DOCKER_HOST=tcp://127.0.0.1:2475 ./gradlew :$SERVICE:test
      computeResources:
        limits:
          memory: '6Gi'
          cpu: 6
        requests:
          memory: '2Gi'
          cpu: 2
  sidecars:
    - image: quay.io/cloudservices/kubedock:latest
      name: kubedock
      env:
        - name: KUBECONFIG
          value: /tmp/kubeconfig
        - name: KUBECONFIG_VALUE
          valueFrom:
            secretKeyRef:
              name: $(params.PROVISION_EAAS_SPACE_SECRET_REF)
              key: kubeconfig
        - name: EAAS_NAMESPACE
          valueFrom:
            secretKeyRef:
              name: $(params.PROVISION_EAAS_SPACE_SECRET_REF)
              key: namespace
      script: |
        #!/bin/bash -ex

        echo "$KUBECONFIG_VALUE" > "$KUBECONFIG"
        /usr/local/bin/kubedock server --kubeconfig $KUBECONFIG --namespace $EAAS_NAMESPACE --port-forward -v=9      
