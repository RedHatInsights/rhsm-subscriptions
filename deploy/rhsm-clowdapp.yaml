---
apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: rhsm
parameters:
  - name: IMAGE_PULL_SECRET
    value: quay-cloudservices-pull
  - name: ENV_NAME
    value: env-rhsm
  - name: IMAGE
    value: quay.io/cloudservices/rhsm-subscriptions
  - name: IMAGE_TAG
    value: latest

objects:
  - apiVersion: cloud.redhat.com/v1alpha1
    kind: ClowdApp
    metadata:
      name: rhsm
    spec:
      # The name of the ClowdEnvironment providing the services
      envName: ${ENV_NAME}
      # IQE plugin your ClowdApp is associated with
      testing:
        iqePlugin: rhsm-subscriptions

  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: swatch-otel-config-v1
    data:
      relay: |
        extensions:
          health_check:
            endpoint: 0.0.0.0:13133
        receivers:
          otlp:
            protocols:
              grpc:
                endpoint: 0.0.0.0:4317
              http:
                endpoint: 0.0.0.0:4318
          syslog:
            protocol: rfc3164
            udp:
              listen_address: '0.0.0.0:54526'
          filelog:
            include:
              - /logs/server.log
            start_at: end
            operators:
              - type: json_parser
                parse_from: body
                parse_to: attributes
        processors:
          batch:
          transform/syslog:
            log_statements:
            - context: log
              statements:
              - set(resource.attributes["host.name"], attributes["hostname"]) where attributes["hostname"] != nil
              - set(body, attributes["message"]) where attributes["message"] != nil
          transform/file_logs:
            log_statements:
            - context: log
              statements:
              - set(body, attributes) where IsMap(attributes)
              - keep_keys(body, ["message", "severity", "properties"])
        exporters:
          debug:
            verbosity: detailed
        service:
          extensions:
            - health_check
          pipelines:
            traces:
              receivers: [otlp]
              processors: [batch]
              exporters: [debug]
            logs/syslog:
              receivers: [syslog]
              processors: [batch, transform/syslog]
              exporters: [debug]
            logs/file:
              receivers: [filelog]
              processors: [batch, transform/file_logs]
              exporters: [debug]
          telemetry:
            logs:
              level: info

  - apiVersion: v1
    kind: Secret
    metadata:
      name: signalfx
    type: Opaque
    data:
      # dummy-token for testing purposes only
      token: ZHVtbXktdG9rZW4=

  - apiVersion: v1
    kind: Secret
    metadata:
      name: swatch-managed-kafka
    type: Opaque
    data:
      ## dummy credentials for testing purposes only
      # dummy-username
      username: ZHVtbXktdXNlcm5hbWU=
      # dummy-password
      password: ZHVtbXktcGFzc3dvcmQ=
      # dummy-web-name:dummy-web-client:13345
      servers: ZHVtbXktd2ViLW5hbWU6ZHVtbXktd2ViLWNsaWVudDoxMzM0NQ==

  # Placeholder cdappconfig for Clowder/IQE: ingress is excluded from ephemeral deploy
  # but Clowder still expects this secret when reconciling the rhsm ClowdJobInvocation.
  # IQE does not use the upload pipeline in clowder_smoke.
  - apiVersion: v1
    kind: Secret
    metadata:
      name: ingress
    type: Opaque
    stringData:
      cdappconfig.json: >-
        {"logging":{"type":"null","cloudwatch":{"accessKeyId":"","logGroup":"","region":"","secretAccessKey":""}},"metricsPath":"/metrics","metricsPort":9000,"privatePort":10000,"publicPort":8000,"webPort":8000,"dependencyEndpoints":{"v2":{}},"endpoints":[],"metadata":{"envName":"${ENV_NAME}","name":"ingress"}}

  # Same as ingress above: required dependency secret only; storage-broker is not deployed.
  - apiVersion: v1
    kind: Secret
    metadata:
      name: storage-broker
    type: Opaque
    stringData:
      cdappconfig.json: >-
        {"logging":{"type":"null","cloudwatch":{"accessKeyId":"","logGroup":"","region":"","secretAccessKey":""}},"metricsPath":"/metrics","metricsPort":9000,"privatePort":10000,"publicPort":8000,"webPort":8000,"dependencyEndpoints":{"v2":{}},"endpoints":[],"metadata":{"envName":"${ENV_NAME}","name":"storage-broker"}}