---
apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: swatch-utilization
parameters:
  - name: JAVA_DEBUG
    # Set to "true" to enable remote debugging
    value: ''
  - name: QUARKUS_LAUNCH_DEVMODE
    value: ''
  - name: IMAGE_PULL_SECRET
    value: quay-cloudservices-pull
  - name: MEMORY_REQUEST
    value: 512Mi
  - name: MEMORY_LIMIT
    value: 512Mi
  - name: CPU_REQUEST
    value: 200m
  - name: CPU_LIMIT
    value: '1'
  - name: ENV_NAME
    value: env-swatch-utilization
  - name: REPLICAS
    value: '1'
  - name: IMAGE
    value: quay.io/cloudservices/swatch-utilization
  - name: IMAGE_TAG
    value: latest
  - name: ENABLE_SPLUNK_HEC
    value: 'true'
  - name: SPLUNK_HEC_URL
    value: https://splunk-hec.redhat.com:8088
  - name: SPLUNK_SOURCE
    value: 'swatch-utilization'
  - name: SPLUNK_SOURCE_TYPE
    value: 'swatch'
  - name: SPLUNK_HEC_BATCH_SIZE
    value: '1000'
  - name: SPLUNK_HEC_BATCH_INTERVAL
    value: '10S'
  - name: SPLUNK_HEC_RETRY_COUNT
    value: '3'
  - name: SPLUNK_HEC_INCLUDE_EX
    value: 'true'
  - name: LOGGING_LEVEL_ROOT
    value: 'INFO'
  - name: LOGGING_LEVEL_COM_REDHAT_SWATCH
    value: 'INFO'
  - name: KAFKA_UTILIZATION_REPLICAS
    value: '3'
  - name: KAFKA_UTILIZATION_PARTITIONS
    value: '3'
  - name: QUARKUS_PROFILE
    value: prod
  - name: OTEL_DISABLED
    value: 'true'
  - name: OTEL_SIDECAR_IMAGE
    value: quay.io/signalfx/splunk-otel-collector:0.140.0
  - name: OTEL_SIDECAR_CONFIG_MAP
    value: swatch-otel-config
  - name: OTEL_SIDECAR_SPLUNK_CONFIG
    value: '/etc/otelcol/relay'
  - name: OTEL_ENV_NAME
    value: env-swatch-utilization
  - name: OTEL_K8S_CLUSTER_NAME
    value: ephemeral
  - name: OTEL_SIGNALFX_TOKEN_SECRET_NAME
    value: signalfx
  - name: OTEL_SIGNALFX_TOKEN_SECRET_KEY
    value: token
  - name: CUSTOMER_OVER_USAGE_DEFAULT_THRESHOLD_PERCENT
    value: '5.0'
  - name: ORG_PREFERENCE_DEFAULT_THRESHOLD
    value: '80'
  - name: LOGGING_SHOW_SQL_QUERIES
    value: 'false'
  # allow overriding to support independent deploy with bonfire
  - name: DB_POD
    value: swatch-database
  # Using a value of 'select 1' makes this job a no-op by default.
  # When needed bump DB_CHANGELOG_CLEANUP_RUN_NUMBER, set DB_CHANGELOG_CLEANUP_SQL to 'delete from databasechangeloglock_swatch_utilization'
  - name: DB_CHANGELOG_CLEANUP_RUN_NUMBER
    value: '1'
  - name: DB_CHANGELOG_CLEANUP_SQL
    value: 'select 1'
  - name: EGRESS_IMAGE
    value: quay.io/redhat-services-prod/rh-subs-watch-tenant/rhsm-subscriptions-egress
  - name: EGRESS_IMAGE_TAG
    value: latest
  - name: USER_JAVA_OPTS
    # Heap dumps triggered by heap monitor at 75% threshold (leaves headroom for compression + upload)
    value: '-Xmx150m -XX:MaxDirectMemorySize=32m -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/heapdumps/ -XX:NativeMemoryTracking=summary'
  - name: ENABLE_HEAP_MONITOR
    value: 'true'
  - name: HEAP_MONITOR_THRESHOLD_PERCENT
    value: '60'
  - name: HEAP_MONITOR_RESET_PERCENT
    value: '55'
  - name: HEAP_DUMP_UPLOAD_S3
    value: 'false'
  - name: HEAP_DUMP_S3_PREFIX
    value: swatch-utilization/heapdumps
  - name: HEAP_DUMP_S3_BUCKET_NAME
    value: swatch-utilization-heapdumps
  - name: HEAP_DUMP_S3_SECRET_NAME
    # Secret name for S3 credentials (stage/prod: 'heapdump-s3' from app-interface)
    value: heapdump-s3

objects:
- apiVersion: cloud.redhat.com/v1alpha1
  kind: ClowdApp
  metadata:
    name: swatch-utilization
    labels:
      prometheus: quarkus
  spec:
    envName: ${ENV_NAME}
    database:
      sharedDbAppName: ${DB_POD}
    dependencies:
      - ${DB_POD}
      - swatch-contracts
      - rbac

    kafkaTopics:
      - replicas: ${{KAFKA_UTILIZATION_REPLICAS}}
        partitions: ${{KAFKA_UTILIZATION_PARTITIONS}}
        topicName: platform.rhsm-subscriptions.utilization
      - replicas: ${{KAFKA_UTILIZATION_REPLICAS}}
        partitions: ${{KAFKA_UTILIZATION_PARTITIONS}}
        topicName: platform.notifications.ingress

    pullSecrets:
      name: ${IMAGE_PULL_SECRET}

    deployments:
      - name: service
        replicas: ${{REPLICAS}}
        webServices:
          public:
            enabled: true
        podSpec:
          image: ${IMAGE}:${IMAGE_TAG}
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /health/live
              port: 9000
              scheme: HTTP
            initialDelaySeconds: 20
            periodSeconds: 20
            successThreshold: 1
            timeoutSeconds: 5
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /health/ready
              port: 9000
              scheme: HTTP
            initialDelaySeconds: 20
            periodSeconds: 20
            successThreshold: 1
            timeoutSeconds: 5
          resources:
            requests:
              cpu: ${CPU_REQUEST}
              memory: ${MEMORY_REQUEST}
            limits:
              cpu: ${CPU_LIMIT}
              memory: ${MEMORY_LIMIT}
          env:
            - name: JAVA_DEBUG
              value: ${JAVA_DEBUG}
            - name: QUARKUS_LAUNCH_DEVMODE
              value: ${QUARKUS_LAUNCH_DEVMODE}
            - name: LOGGING_LEVEL_ROOT
              value: ${LOGGING_LEVEL_ROOT}
            - name: LOGGING_LEVEL_COM_REDHAT_SWATCH
              value: ${LOGGING_LEVEL_COM_REDHAT_SWATCH}
            - name: ENABLE_SPLUNK_HEC
              value: ${ENABLE_SPLUNK_HEC}
            - name: SPLUNKMETA_namespace
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
            - name: HOST_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.name
            - name: SPLUNK_HEC_URL
              value: ${SPLUNK_HEC_URL}
            - name: SPLUNK_HEC_TOKEN
              valueFrom:
                secretKeyRef:
                  name: splunk-hec-external
                  key: token
            - name: SPLUNK_SOURCE
              value: ${SPLUNK_SOURCE}
            - name: SPLUNK_SOURCE_TYPE
              value: ${SPLUNK_SOURCE_TYPE}
            - name: SPLUNK_HEC_BATCH_SIZE
              value: ${SPLUNK_HEC_BATCH_SIZE}
            - name: SPLUNK_HEC_BATCH_INTERVAL
              value: ${SPLUNK_HEC_BATCH_INTERVAL}
            - name: SPLUNK_HEC_RETRY_COUNT
              value: ${SPLUNK_HEC_RETRY_COUNT}
            - name: SPLUNK_HEC_INCLUDE_EX
              value: ${SPLUNK_HEC_INCLUDE_EX}
            - name: SWATCH_SELF_PSK
              valueFrom:
                secretKeyRef:
                  name: swatch-psks
                  key: self
            - name: QUARKUS_PROFILE
              value: ${QUARKUS_PROFILE}
            - name: OTEL_DISABLED
              value: ${OTEL_DISABLED}
            - name: CUSTOMER_OVER_USAGE_DEFAULT_THRESHOLD_PERCENT
              value: ${CUSTOMER_OVER_USAGE_DEFAULT_THRESHOLD_PERCENT}
            - name: ORG_PREFERENCE_DEFAULT_THRESHOLD
              value: ${ORG_PREFERENCE_DEFAULT_THRESHOLD}
            - name: LOGGING_SHOW_SQL_QUERIES
              value: ${LOGGING_SHOW_SQL_QUERIES}
            - name: DATABASE_HOST
              valueFrom:
                secretKeyRef:
                  name: ${DB_POD}-db
                  key: db.host
            - name: DATABASE_PORT
              valueFrom:
                secretKeyRef:
                  name: ${DB_POD}-db
                  key: db.port
            - name: DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ${DB_POD}-db
                  key: db.user
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ${DB_POD}-db
                  key: db.password
            - name: DATABASE_DATABASE
              valueFrom:
                secretKeyRef:
                  name: ${DB_POD}-db
                  key: db.name
            - name: JAVA_OPTS_APPEND
              value: ${USER_JAVA_OPTS}
            - name: ENABLE_HEAP_MONITOR
              value: ${ENABLE_HEAP_MONITOR}
            - name: HEAP_MONITOR_THRESHOLD_PERCENT
              value: ${HEAP_MONITOR_THRESHOLD_PERCENT}
            - name: HEAP_MONITOR_RESET_PERCENT
              value: ${HEAP_MONITOR_RESET_PERCENT}
            - name: HEAP_DUMP_UPLOAD_S3
              value: ${HEAP_DUMP_UPLOAD_S3}
            - name: HEAP_DUMP_S3_PREFIX
              value: ${HEAP_DUMP_S3_PREFIX}
            - name: HEAP_DUMP_S3_BUCKET_NAME
              value: ${HEAP_DUMP_S3_BUCKET_NAME}
          volumeMounts:
            - name: logs
              mountPath: /logs
            - name: heapdumps
              mountPath: /heapdumps
            - name: heapdump-s3-secret
              mountPath: /aws
              readOnly: true
          sidecars:
          - name: otel-collector
            enabled: true
            configMap: ${OTEL_SIDECAR_CONFIG_MAP}
            image: ${OTEL_SIDECAR_IMAGE}
            envVars:
              - name: ENV_NAME
                value: ${OTEL_ENV_NAME}
              - name: K8S_CLUSTER_NAME
                value: ${OTEL_K8S_CLUSTER_NAME}
              - name: SPLUNK_OBSERVABILITY_ACCESS_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: ${OTEL_SIGNALFX_TOKEN_SECRET_NAME}
                    key: ${OTEL_SIGNALFX_TOKEN_SECRET_KEY}
              - name: SPLUNK_CONFIG
                value: ${OTEL_SIDECAR_SPLUNK_CONFIG}
              - name: SPLUNK_MEMORY_TOTAL_MIB
                value: '1024'
          volumes:
            - name: logs
              emptyDir:
            - name: heapdumps
              emptyDir:
            - name: heapdump-s3-secret
              secret:
                secretName: ${HEAP_DUMP_S3_SECRET_NAME}
                optional: true

- apiVersion: cloud.redhat.com/v1alpha1
  kind: ClowdApp
  metadata:
    name: swatch-utilization-db-cleanup
  spec:
    envName: ${ENV_NAME}

    database:
      sharedDbAppName: ${DB_POD}

    dependencies:
      - ${DB_POD}

    pullSecrets:
      name: ${IMAGE_PULL_SECRET}

    kafkaTopics: [ ]
    deployments: [ ]
    jobs:
    - name: changelog-${DB_CHANGELOG_CLEANUP_RUN_NUMBER}
      restartPolicy: Never
      podSpec:
        image: ${EGRESS_IMAGE}:${EGRESS_IMAGE_TAG}
        name: db-changelog-cleanup
        command: [ "/bin/sh", "-c" ]
        args:
          - psql -h $POSTGRESQL_SERVICE_HOST -U $POSTGRESQL_USER $POSTGRESQL_DATABASE -c "$DB_CHANGELOG_CLEANUP_SQL"
        resources:
          requests:
            cpu: 100m
            memory: 50Mi
          limits:
            cpu: 100m
            memory: 100Mi
        env:
          - name: POSTGRESQL_SERVICE_HOST
            valueFrom:
              secretKeyRef:
                name: ${DB_POD}-db
                key: db.host
          - name: POSTGRESQL_USER
            valueFrom:
              secretKeyRef:
                name: ${DB_POD}-db
                key: db.user
          - name: POSTGRESQL_DATABASE
            valueFrom:
              secretKeyRef:
                name: ${DB_POD}-db
                key: db.name
          - name: PGPASSWORD
            valueFrom:
              secretKeyRef:
                name: ${DB_POD}-db
                key: db.password
          - name: DB_CHANGELOG_CLEANUP_SQL
            value: ${DB_CHANGELOG_CLEANUP_SQL}

- apiVersion: cloud.redhat.com/v1alpha1
  kind: ClowdJobInvocation
  metadata:
    name: utilization-db-changelog-${DB_CHANGELOG_CLEANUP_RUN_NUMBER}
  spec:
    appName: swatch-utilization-db-cleanup
    jobs:
      - changelog-${DB_CHANGELOG_CLEANUP_RUN_NUMBER}

- apiVersion: v1
  kind: Secret
  metadata:
    name: swatch-psks
  data:
    self: cGxhY2Vob2xkZXI=
