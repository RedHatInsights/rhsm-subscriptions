# SWATCH Self PSK for internal service communication and for unit tests
%dev.SWATCH_SELF_PSK=placeholder
%test.SWATCH_SELF_PSK=${%dev.SWATCH_SELF_PSK}
# stage/prod values come from clowdapp.yaml for individual services

# Controls whether RbacRolesAugmentor is included at build time via @IfBuildProperty (requires rebuild to change)
swatch-common-security.include-rbac=true

SWATCH_TEST_APIS_ENABLED=true
%component-test.SWATCH_TEST_APIS_ENABLED=false
%prod.SWATCH_TEST_APIS_ENABLED=false

RBAC_ENABLED=true
RBAC_ENDPOINT=${clowder.endpoints.rbac-service.url}
%dev.RBAC_ENDPOINT=http://localhost:8080
%test.RBAC_ENDPOINT=http://localhost:8080
# Note the keystore and truststore values must be prefixed with either "classpath:" or "file:"
quarkus.rest-client."com.redhat.swatch.clients.rbac.api.resources.AccessApi".url=${RBAC_ENDPOINT}/api/rbac/v1
quarkus.rest-client."com.redhat.swatch.clients.rbac.api.resources.AccessApi".trust-store=${clowder.endpoints.rbac-service.trust-store-path}
quarkus.rest-client."com.redhat.swatch.clients.rbac.api.resources.AccessApi".trust-store-password=${clowder.endpoints.rbac-service.trust-store-password}
quarkus.rest-client."com.redhat.swatch.clients.rbac.api.resources.AccessApi".trust-store-type=${clowder.endpoints.rbac-service.trust-store-type}

# Unleash toggle: when enabled, KesselRolesAugmentor handles auth and RbacRolesAugmentor is skipped
# Toggle name: swatch.common-security.use-kessel-rbac (default off — managed in Unleash)
quarkus.unleash.url=${UNLEASH_URL:http://localhost:4242/api}
quarkus.unleash.token=${UNLEASH_API_TOKEN:default:development.unleash-insecure-api-token}
quarkus.unleash.name-prefix=swatch
quarkus.unleash.devservices.enabled=${ENABLE_UNLEASH_DEV_SERVICES:false}
%test.quarkus.unleash.active=false

# Kessel / RBACv2 configuration
KESSEL_ENDPOINT=${clowder.endpoints.kessel-inventory-api.hostname:localhost}:9000
%dev.KESSEL_ENDPOINT=localhost:9000
%test.KESSEL_ENDPOINT=localhost:9000
KESSEL_INSECURE=true
%prod.KESSEL_INSECURE=false
KESSEL_TIMEOUT_MS=5000

swatch.kessel.endpoint=${KESSEL_ENDPOINT}
swatch.kessel.insecure=${KESSEL_INSECURE}
swatch.kessel.timeout-ms=${KESSEL_TIMEOUT_MS}